<div class="min-h-screen bg-gray-100 py-8 px-4">
  <div class="max-w-6xl mx-auto">
    <header class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800">Users Dashboard</h1>
      <button
        type="button"
        (click)="logout()"
        class="px-4 py-2 bg-red-600 text-white font-medium rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-colors"
      >
        Logout
      </button>
    </header>

    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-md mb-6">
        {{ error() }}
      </div>
    }

    <section class="bg-white rounded-lg shadow-md p-6 mb-8">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold text-gray-800">Users</h2>
        <button
          type="button"
          (click)="loadUsers()"
          [disabled]="loading()"
          class="px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
        >
          Refresh
        </button>
      </div>

      <table class="w-full">
        <thead>
          <tr class="border-b border-gray-200">
            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-600">ID</th>
            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-600">Name</th>
            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-600">Email</th>
            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-600">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users(); track user.id) {
            <tr class="border-b border-gray-100 hover:bg-gray-50">
              <td class="py-3 px-4 text-sm text-gray-700">{{ user.id }}</td>
              <td class="py-3 px-4 text-sm text-gray-700">{{ user.name }}</td>
              <td class="py-3 px-4 text-sm text-gray-700">{{ user.email }}</td>
              <td class="py-3 px-4">
                <button
                  type="button"
                  (click)="editUser(user)"
                  class="px-3 py-1 bg-yellow-500 text-white text-sm font-medium rounded hover:bg-yellow-600 focus:outline-none focus:ring-2 focus:ring-yellow-500 focus:ring-offset-2 mr-2 transition-colors"
                >
                  Edit
                </button>
                <button
                  type="button"
                  (click)="confirmDelete(user)"
                  class="px-3 py-1 bg-red-600 text-white text-sm font-medium rounded hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition-colors"
                >
                  Delete
                </button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="py-8 text-center text-gray-500">No users found</td>
            </tr>
          }
        </tbody>
      </table>
    </section>

    <section class="bg-white rounded-lg shadow-md p-6">
      <h2 class="text-xl font-semibold text-gray-800 mb-6">
        {{ editingUser() ? 'Edit User' : 'Create User' }}
      </h2>

      <form (ngSubmit)="saveUser()" class="max-w-md space-y-4">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input
            id="name"
            type="text"
            [(ngModel)]="formData.name"
            name="name"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="formData.email"
            name="email"
            required
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          />
        </div>

        <div class="flex gap-4 pt-2">
          <button
            type="submit"
            [disabled]="saving()"
            class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
          >
            {{ editingUser() ? 'Update' : 'Create' }}
          </button>

          @if (editingUser()) {
            <button
              type="button"
              (click)="cancelEdit()"
              class="px-6 py-2 bg-gray-600 text-white font-medium rounded-md hover:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:ring-offset-2 transition-colors"
            >
              Cancel
            </button>
          }
        </div>
      </form>
    </section>
  </div>
</div>
