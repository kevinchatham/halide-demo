<div class="min-h-screen flex items-center justify-center bg-zinc-950 px-4">
  <div class="w-full max-w-md bg-zinc-900 rounded-lg shadow-md p-8 border border-zinc-700">
    <div class="text-center mb-8">
      <img src="halide-logo.png" alt="Halide Logo" class="h-16 mx-auto mb-4" />
      <h1 class="text-2xl font-bold text-slate-50">Halide Demo Login</h1>
      <p class="text-sm text-slate-400 mt-2">Any credentials are accepted</p>
    </div>

    <form class="space-y-6">
      <div>
        <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
        <input
          id="username"
          type="text"
          [formField]="loginForm.username!"
          class="w-full px-4 py-2 border border-zinc-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-zinc-800 text-slate-50 placeholder-slate-400"
        />
        @if (loginForm.username!().invalid() && loginForm.username!().touched()) {
          <p class="text-red-400 text-sm mt-1">Username is required</p>
        }
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Password</label>
        <input
          id="password"
          type="password"
          [formField]="loginForm.password!"
          class="w-full px-4 py-2 border border-zinc-700 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-zinc-800 text-slate-50 placeholder-slate-400"
        />
        @if (loginForm.password!().invalid() && loginForm.password!().touched()) {
          <p class="text-red-400 text-sm mt-1">Password is required</p>
        }
      </div>

      @if (error()) {
        <div class="bg-red-900/30 border border-red-700 text-red-400 px-4 py-3 rounded-md text-sm">
          {{ error() }}
        </div>
      }

      <button
        type="button"
        (click)="onSubmit()"
        [disabled]="loginForm().submitting()"
        class="w-full py-3 px-4 bg-indigo-600 text-white font-medium rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-zinc-900 disabled:bg-zinc-700 disabled:cursor-not-allowed transition-colors"
      >
        @if (loginForm().submitting()) {
          Logging in...
        } @else {
          Login
        }
      </button>
    </form>
  </div>
</div>
